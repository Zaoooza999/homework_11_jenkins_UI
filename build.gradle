plugins {
    id 'java'
    id 'io.qameta.allure' version '4.0.0'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation (
            'org.junit.jupiter:junit-jupiter:6.0.3',
            'com.codeborne:selenide:7.16.0',
            'org.slf4j:slf4j-simple:2.0.17'
    )
}

allure {
    report {//секция репорта
        version.set("2.39.0") //версия Allure Report
    }
}


tasks.withType(Test) {
    useJUnitPlatform()

    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}